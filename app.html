<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a6ee8">
<title>Français pour bébas</title>
<style>
  :root{--sea:#0a6ee8;--deep:#064b9e;--sun:#ffc93c;--coral:#ff6b6b;--good:#12b886;--bad:#e03131;
    --ink:#12263a;--muted:#5b7590;--line:#e9eef5;--card:#fff;--bg:#eef4fb}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--ink);background:var(--bg);padding:0 0 calc(30px + env(safe-area-inset-bottom))}
  .top{position:sticky;top:0;z-index:20;color:#fff;background:linear-gradient(135deg,var(--sea),var(--deep));
    padding:max(12px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;
    box-shadow:0 4px 18px rgba(6,42,90,.25)}
  .top h1{font-size:17px;margin:0;font-weight:700;flex:1}
  .back{background:rgba(255,255,255,.2);border:0;color:#fff;width:34px;height:34px;border-radius:50%;
    font-size:18px;cursor:pointer;display:none}
  .wrap{max-width:540px;margin:0 auto;padding:16px}
  .card{background:var(--card);border-radius:18px;padding:16px;margin:0 0 14px;box-shadow:0 8px 22px rgba(6,42,90,.08)}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 12px}
  .lcard{cursor:pointer;display:flex;align-items:center;gap:14px}
  .lnum{width:46px;height:46px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;
    font-weight:800;color:#fff;background:linear-gradient(135deg,var(--sun),#f6a700)}
  .lcard .t{font-size:18px;font-weight:700}.lcard .s{font-size:13px;color:var(--muted)}
  .big{display:block;width:100%;border:0;cursor:pointer;color:#fff;font-size:16px;font-weight:700;
    padding:15px;border-radius:15px;margin:0 0 10px;text-align:center;text-decoration:none}
  .big.coral{background:linear-gradient(135deg,var(--coral),#e8506b);box-shadow:0 8px 20px rgba(255,107,107,.3)}
  .big.green{background:linear-gradient(135deg,var(--good),#0b9);box-shadow:0 8px 20px rgba(18,184,134,.3)}
  .pbtn{border:0;flex-shrink:0;width:40px;height:40px;border-radius:50%;font-size:15px;cursor:pointer;
    background:linear-gradient(135deg,var(--sea),var(--deep));color:#fff;box-shadow:0 4px 10px rgba(10,110,232,.3);transition:transform .08s}
  .pbtn:active{transform:scale(.88)}.pbtn.playing{background:linear-gradient(135deg,var(--sun),#f6a700);color:#5a3d00}
  .pbtn.f{background:linear-gradient(135deg,#ff6b95,#e8506b)}.pbtn.m{background:linear-gradient(135deg,#3aa0ff,#0a6ee8)}
  .pbtn.sm{width:34px;height:34px;font-size:13px}
  table{width:100%;border-collapse:collapse}
  td{padding:9px 4px;border-top:1px solid var(--line);vertical-align:middle}
  .pron{color:var(--muted);font-size:14px;width:26%}.form{font-weight:700;font-size:16px}
  .exs{color:#3a5068;font-size:13px}.es{color:var(--muted);font-size:12px}
  .trow td:first-child{width:33%}
  .tlabel{font-weight:700;font-size:13px}.tlabel .st{display:block;color:var(--muted);font-size:11px;font-weight:400}
  .recog{opacity:.6}
  .notes li{font-size:13.5px;line-height:1.55;margin:0 0 7px;color:#2a3f56}
  .v{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
  .v:first-child{border-top:0}.vmain{flex:1;min-width:0}
  .vfr{font-weight:700;font-size:16px}.vfr .g{color:var(--coral);font-size:13px;font-weight:600}
  .ves{color:var(--muted);font-size:12.5px}.vex{color:#3a5068;font-size:12.5px;font-style:italic;margin-top:1px}
  .chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
  .chip.cog{background:#d3f9d8;color:#0b7a54}.chip.non{background:#ffe3e3;color:#c92a2a}.chip.semi{background:#fff3bf;color:#8a6d00}
  .tt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#e7f0fb;color:var(--deep);white-space:nowrap}
  .gpair{display:flex;gap:6px;align-items:center}
  .sent{padding:12px 0;border-top:1px solid var(--line);display:flex;gap:11px;align-items:flex-start}
  .sent:first-child{border-top:0}.sfr{font-weight:600;font-size:15.5px;line-height:1.35}
  .ses{color:var(--muted);font-size:13px;margin-top:2px}.sen{color:#93a6ba;font-size:12px;font-style:italic;margin-top:1px}
  .tabs{display:flex;gap:6px;margin:0 0 14px;flex-wrap:wrap}
  .tab{flex:1;min-width:70px;text-align:center;padding:9px 4px;border-radius:11px;font-size:12px;font-weight:700;background:#fff;color:var(--muted);border:0;cursor:pointer}
  .tab.on{background:var(--sea);color:#fff}
  /* flashcards + quiz */
  .stage{background:#fff;border-radius:22px;box-shadow:0 12px 30px rgba(6,42,90,.14);padding:24px 18px;
    min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .mix{font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--muted);margin-bottom:10px}
  .mix .hard{color:var(--coral)}.mix .cog{color:var(--good)}
  .prompt{font-size:14px;color:var(--muted)}.big2{font-size:30px;font-weight:800;margin:8px 0}
  .rev{font-size:15px;color:var(--muted);min-height:76px;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center}
  .rev .fr{font-size:24px;font-weight:800;color:var(--ink)}.rev .ipa{color:var(--sea);font-family:"Times New Roman",serif}
  .btns{display:flex;gap:10px;margin-top:16px}.btns button{flex:1;border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}
  .reveal{background:var(--sea)}.again{background:#ff8787}.good{background:var(--good)}
  .prog{height:6px;background:#dbe5f0;border-radius:3px;overflow:hidden;margin:0 0 14px}.prog>i{display:block;height:100%;background:var(--sun);width:0}
  .opt{display:block;width:100%;text-align:left;border:2px solid var(--line);background:#fff;border-radius:13px;
    padding:14px;margin:8px 0;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer}
  .opt.correct{border-color:var(--good);background:#eafaf3}.opt.wrong{border-color:var(--bad);background:#fdecec}
  .qtype{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .qbig{font-size:22px;font-weight:800;margin:6px 0 4px}.qsub{color:var(--muted);font-size:13px;margin-bottom:6px}
  .hidden{display:none!important}.empty{text-align:center;color:var(--muted);padding:36px 16px}
</style>
</head>
<body>
<div class="top"><button class="back" id="back">‹</button><h1 id="ttl">Français pour bébas</h1><span style="font-size:20px">🌞</span></div>
<div id="view" class="wrap"></div>
<script>
const AUDIO={base:"",clips:{},v:1};
let LESSONS=[], GRAMMAR=null, cur=null;

async function boot(){
  const man=await fetch('data/audio_manifest.json').then(r=>r.json());
  AUDIO.base=man.audio_base; AUDIO.clips=man.clips; AUDIO.v=man.version||1;
  GRAMMAR=await fetch('data/spoken_grammar.json').then(r=>r.json()).catch(()=>null);
  const files=['data/curriculum/lesson_01_etre.json','data/curriculum/lesson_02_avoir.json'];
  LESSONS=await Promise.all(files.map(f=>fetch(f).then(r=>r.json())));
  route();
}
window.addEventListener('hashchange',route);
function aurl(id){ return AUDIO.base+AUDIO.clips[id]+'?v='+AUDIO.v; }
function play(id,btn){
  if(!id||!AUDIO.clips[id])return;
  if(cur){cur.el.pause();cur.el.currentTime=0;cur.btn&&cur.btn.classList.remove('playing');}
  const el=new Audio(aurl(id)); cur={el,btn}; if(btn)btn.classList.add('playing');
  el.addEventListener('ended',()=>btn&&btn.classList.remove('playing'));
  el.play().catch(()=>btn&&btn.classList.remove('playing'));
}
document.body.addEventListener('click',e=>{const b=e.target.closest('[data-aud]'); if(b)play(b.dataset.aud,b);});
function chip(ct){return ct==='non_cognate'?'<span class="chip non">nuevo ⭐</span>':ct==='semi'?'<span class="chip semi">semi</span>':'<span class="chip cog">cognado</span>';}
function pbtn(id,cls){return `<button class="pbtn ${cls||''}" data-aud="${id}">▶︎</button>`;}
const esc=s=>(s||'').replace(/</g,'&lt;');

function route(){
  const h=location.hash.slice(1);
  document.getElementById('back').style.display=h?'block':'none';
  document.getElementById('back').onclick=()=>location.hash='';
  if(h.startsWith('lesson/'))renderLesson(h.split('/')[1]);
  else if(h==='flash')renderFlash();
  else if(h==='quiz')renderQuiz();
  else renderHome();
}
function renderHome(){
  document.getElementById('ttl').textContent='Français pour bébas';
  document.getElementById('view').innerHTML=`
    <div class="card" style="text-align:center"><div style="font-size:15px;line-height:1.5">Bienvenue, ma belle 🌊<br>
    <span style="color:var(--muted);font-size:13px">Le français à partir de ton espagnol · cap sur Nice</span></div></div>
    ${LESSONS.map(L=>`<div class="card lcard" onclick="location.hash='lesson/${L.id}'">
      <div class="lnum">${L.order}</div><div class="vmain"><div class="t">${L.title}</div><div class="s">${L.es_title}</div></div>
      <span style="color:var(--muted);font-size:22px">›</span></div>`).join('')}
    <a class="big coral" href="#flash">🎴 Flashcards — 3:2 drill</a>
    <a class="big green" href="#quiz">✅ Quiz de grammaire</a>`;
}
function vocabRow(it){
  if(it.ex_m) return `<div class="v"><div class="vmain">
    <div class="vfr">${it.fr_m} <span class="g">/ ${it.fr_f}</span></div>
    <div class="ves">${it.es} · ${it.en}</div><div class="vex">« ${esc(it.ex_m)} / ${esc(it.ex_f)} »</div></div>
    ${chip(it.cognate_type)}<div class="gpair">${pbtn(it.audio_m,'m sm')}${pbtn(it.audio_f,'f sm')}</div></div>`;
  return `<div class="v"><div class="vmain"><div class="vfr">${it.fr} ${it.gender?`<span class="g">(${it.gender})</span>`:''}</div>
    <div class="ves">${it.es} · ${it.en}</div><div class="vex">« ${esc(it.ex)} »</div></div>
    ${chip(it.cognate_type)}${pbtn(it.audio)}</div>`;
}
function sentRow(it){
  const tt=it.tense?`<span class="tt">${it.tense}</span> `:'';
  if(it.fr_m) return `<div class="sent"><div class="vmain"><div class="sfr">${tt}♂ ${esc(it.fr_m)}<br>♀ ${esc(it.fr_f)}</div>
    <div class="ses">${it.es}</div><div class="sen">${it.en}</div></div>
    <div class="gpair" style="flex-direction:column">${pbtn(it.audio_m,'m sm')}${pbtn(it.audio_f,'f sm')}</div></div>`;
  return `<div class="sent"><div class="vmain"><div class="sfr">${tt}${esc(it.fr)}</div><div class="ses">${it.es}</div>
    <div class="sen">${it.en}${it.gloss?' · '+it.gloss:''}</div></div>${pbtn(it.audio)}</div>`;
}
function renderLesson(id){
  const L=LESSONS.find(x=>x.id===id); if(!L){location.hash='';return;}
  document.getElementById('ttl').textContent=L.title;
  const c=L.grammar.conjugation, T=L.grammar.tenses||[];
  document.getElementById('view').innerHTML=`
    <div class="card"><div style="font-size:14px;line-height:1.5;color:#2a3f56">${L.focus}</div></div>
    <div class="tabs">
      <button class="tab on" data-t="c">Présent</button>
      <button class="tab" data-t="t">Tous les temps</button>
      <button class="tab" data-t="v">Vocab</button>
      <button class="tab" data-t="s">Phrases</button></div>
    <div data-p="c"><div class="card"><h2>${c.verb} · ${c.es}</h2>
      <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px">${L.grammar.intro_es}</div>
      <table>${c.present.map(r=>`<tr><td class="pron">${r.pron}</td>
        <td class="form">${r.form}<div class="exs">${esc(r.ex)}</div><div class="es">${r.es}</div></td>
        <td style="width:44px;text-align:right">${pbtn(r.audio,'sm')}</td></tr>`).join('')}</table></div>
      <div class="card"><h2>Comme on parle 🗣️</h2><ul class="notes" style="padding-left:18px;margin:0">
        ${L.grammar.spoken_notes.map(n=>`<li>${n}</li>`).join('')}</ul></div></div>
    <div data-p="t" class="hidden"><div class="card"><h2>${c.verb} à tous les temps parlés</h2>
      <table>${T.map(r=>`<tr class="trow ${r.status==='recognition_only'?'recog':''}">
        <td><div class="tlabel">${r.tense}<span class="st">${r.label_es}${r.status==='recognition_only'?' · solo leer':''}</span></div></td>
        <td><div class="form" style="font-size:15px">${esc(r.ex)}</div><div class="es">${r.es}</div></td>
        <td style="width:44px;text-align:right">${pbtn(r.audio,'sm')}</td></tr>`).join('')}</table>
      <div style="font-size:12px;color:var(--muted);margin-top:10px">La forme <b>passé simple</b> es solo para leer — nunca se habla.</div></div></div>
    <div data-p="v" class="hidden"><div class="card"><h2>Vocabulaire — ${L.vocab.length} mots</h2>${L.vocab.map(vocabRow).join('')}</div></div>
    <div data-p="s" class="hidden"><div class="card"><h2>Phrases</h2>${L.sentences.map(sentRow).join('')}</div></div>`;
  const v=document.getElementById('view');
  v.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    v.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
    v.querySelectorAll('[data-p]').forEach(p=>p.classList.toggle('hidden',p.dataset.p!==t.dataset.t));});
}
/* -------- Flashcards (3 hard : 2 cognate) -------- */
const shuffle=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1]);
function buildDeck(){
  const all=LESSONS.flatMap(L=>L.vocab);
  const hard=shuffle(all.filter(v=>v.cognate_type==='non_cognate'||v.star));
  const cog=shuffle(all.filter(v=>!(v.cognate_type==='non_cognate'||v.star)));
  const d=[];let hi=0,ci=0;
  while(hi<hard.length||ci<cog.length){
    for(let k=0;k<3&&hi<hard.length;k++)d.push({...hard[hi++],_k:'hard'});
    for(let k=0;k<2&&ci<cog.length;k++)d.push({...cog[ci++],_k:'cog'});}
  return d;
}
let deck=[],di=0;
function renderFlash(){document.getElementById('ttl').textContent='Flashcards';if(!deck.length){deck=buildDeck();di=0;}drawCard();}
function drawCard(){
  const host=document.getElementById('view');
  if(di>=deck.length){host.innerHTML=`<div class="stage"><div class="empty">🎉 Deck terminé !<br><br>
    <button class="big coral" style="max-width:240px" onclick="deck=[];renderFlash()">Recommencer</button></div></div>`;return;}
  const it=deck[di]; const fr=it.fr_m?`${it.fr_m} / ${it.fr_f}`:it.fr; const ipa=it.ipa||it.ipa_m||''; const aud=it.audio||it.audio_m;
  const mix=it._k==='hard'?'<span class="hard">● nuevo / difícil</span>':'<span class="cog">● cognado</span>';
  host.innerHTML=`<div class="prog"><i style="width:${di/deck.length*100}%"></i></div>
    <div class="stage"><div class="mix">${mix} · ${di+1}/${deck.length} · mezcla 3:2</div>
      <div class="prompt">🇪🇸 ¿cómo se dice…?</div><div class="big2">${it.es}</div>
      <div class="rev" id="rev"><button class="pbtn" data-aud="${aud}" style="width:52px;height:52px;font-size:19px">▶︎</button></div></div>
    <div class="btns" id="b"><button class="reveal" id="rb">Voir 🇫🇷</button></div>`;
  document.getElementById('rb').onclick=()=>{
    document.getElementById('rev').innerHTML=`<div class="fr">${fr}</div>${ipa?`<div class="ipa">/${ipa}/</div>`:''}
      <div style="font-size:13px">${it.en}</div><div style="font-size:12px;color:var(--muted);font-style:italic">« ${esc(it.ex||it.ex_m)} »</div>
      <button class="pbtn" data-aud="${aud}" style="margin-top:4px">🔊</button>`;
    play(aud);
    document.getElementById('b').innerHTML=`<button class="again" onclick="grade(0)">Encore</button><button class="good" onclick="grade(1)">Je sais ✓</button>`;
  };
}
function grade(k){if(!k)deck.push(deck[di]);di++;drawCard();}
/* -------- Grammar quiz -------- */
function buildQuiz(){
  const Q=[];
  const allForms=[...new Set(LESSONS.flatMap(L=>L.grammar.conjugation.present.map(r=>r.form)))];
  // conjugation
  LESSONS.forEach(L=>{const c=L.grammar.conjugation; c.present.forEach(r=>{
    const opts=shuffle([r.form,...shuffle(allForms.filter(f=>f!==r.form)).slice(0,3)]);
    Q.push({type:'Conjugaison',q:`${c.verb} — ${r.pron.split('/')[0].trim()}`,sub:c.es,ans:r.form,opts,aud:r.audio});});});
  // translation es->fr (single-form sentences)
  const sents=LESSONS.flatMap(L=>L.sentences).filter(s=>s.fr);
  sents.forEach(s=>{const opts=shuffle([s.fr,...shuffle(sents.filter(x=>x.fr!==s.fr).map(x=>x.fr)).slice(0,2)]);
    Q.push({type:'Traduce 🇪🇸→🇫🇷',q:s.es,sub:'¿cuál es la frase correcta?',ans:s.fr,opts,aud:s.audio});});
  // gender le/la
  LESSONS.flatMap(L=>L.vocab).filter(v=>v.gender&&/^(le |la )/.test(v.fr||'')).forEach(v=>{
    const bare=v.fr.replace(/^(le|la) /,''); const art=v.fr.startsWith('la')?'la':'le';
    Q.push({type:'Genre',q:`___ ${bare}`,sub:'le o la ?',ans:art,opts:shuffle(['le','la']),aud:v.audio});});
  // spanish traps
  (GRAMMAR?.spanish_traps||[]).filter(t=>t.right&&t.wrong&&/[a-z]/i.test(t.wrong)).forEach(t=>{
    Q.push({type:'Trampa 🇪🇸',q:t.right.es,sub:'francés hablado correcto:',ans:t.right.fr,
      opts:shuffle([t.right.fr,t.wrong]),aud:null});});
  return shuffle(Q).slice(0,14);
}
let quiz=[],qi=0,qscore=0;
function renderQuiz(){document.getElementById('ttl').textContent='Quiz';if(!quiz.length){quiz=buildQuiz();qi=0;qscore=0;}drawQ();}
function drawQ(){
  const host=document.getElementById('view');
  if(qi>=quiz.length){const pct=Math.round(qscore/quiz.length*100);
    host.innerHTML=`<div class="stage"><div class="empty"><div style="font-size:40px">${pct>=80?'🎉':pct>=50?'👍':'💪'}</div>
      <div style="font-size:22px;font-weight:800;margin:8px 0">${qscore}/${quiz.length}</div>
      <button class="big coral" style="max-width:240px" onclick="quiz=[];renderQuiz()">Encore</button></div></div>`;return;}
  const q=quiz[qi];
  host.innerHTML=`<div class="prog"><i style="width:${qi/quiz.length*100}%"></i></div>
    <div class="card"><div class="qtype">${q.type} · ${qi+1}/${quiz.length}</div>
      <div class="qbig">${esc(q.q)}</div><div class="qsub">${q.sub||''}</div>
      <div id="opts">${q.opts.map(o=>`<button class="opt" data-o="${esc(o)}">${esc(o)}</button>`).join('')}</div></div>`;
  host.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    if(host.dataset.done)return; host.dataset.done='1';
    const ok=b.dataset.o===q.ans;
    if(ok){b.classList.add('correct');qscore++;} else {b.classList.add('wrong');
      host.querySelectorAll('.opt').forEach(x=>{if(x.dataset.o===q.ans)x.classList.add('correct');});}
    if(q.aud)play(q.aud);
    setTimeout(()=>{host.dataset.done='';qi++;drawQ();},ok?750:1600);
  });
}
boot();
</script>
</body>
</html>
