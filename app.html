<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a6ee8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Français pour bébas</title>
<style>
  :root{--sea:#0a6ee8;--deep:#064b9e;--sun:#ffc93c;--coral:#ff6b6b;--good:#12b886;--bad:#e03131;
    --ink:#12263a;--muted:#5b7590;--line:#e9eef5;--card:#fff;--bg:#eef4fb}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);
    background:var(--bg);padding:0 0 calc(30px + env(safe-area-inset-bottom))}
  .top{position:sticky;top:0;z-index:20;color:#fff;background:linear-gradient(135deg,var(--sea),var(--deep));
    padding:max(12px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 18px rgba(6,42,90,.25)}
  .top h1{font-size:17px;margin:0;font-weight:700;flex:1}
  .back{background:rgba(255,255,255,.2);border:0;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:none}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  .card{background:var(--card);border-radius:18px;padding:16px;margin:0 0 14px;box-shadow:0 8px 22px rgba(6,42,90,.08)}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 12px}
  .lcard{cursor:pointer;display:flex;align-items:center;gap:14px}
  .lnum{width:46px;height:46px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px;
    background:linear-gradient(135deg,var(--sun),#f6a700)}
  .lnum.z{background:linear-gradient(135deg,#6a5cff,#4534d6)}
  .lcard .t{font-size:17px;font-weight:700}.lcard .s{font-size:12.5px;color:var(--muted)}
  .big{display:block;width:100%;border:0;cursor:pointer;color:#fff;font-size:16px;font-weight:700;padding:14px;border-radius:15px;margin:0 0 10px;text-align:center;text-decoration:none}
  .big.coral{background:linear-gradient(135deg,var(--coral),#e8506b)}.big.green{background:linear-gradient(135deg,var(--good),#0b9)}
  .big.purple{background:linear-gradient(135deg,#6a5cff,#4534d6)}
  .pbtn{border:0;flex-shrink:0;width:40px;height:40px;border-radius:50%;font-size:15px;cursor:pointer;background:linear-gradient(135deg,var(--sea),var(--deep));color:#fff;box-shadow:0 4px 10px rgba(10,110,232,.3);transition:transform .08s}
  .pbtn:active{transform:scale(.88)}.pbtn.playing{background:linear-gradient(135deg,var(--sun),#f6a700);color:#5a3d00}
  .pbtn.f{background:linear-gradient(135deg,#ff6b95,#e8506b)}.pbtn.m{background:linear-gradient(135deg,#3aa0ff,#0a6ee8)}
  .pbtn.sm{width:34px;height:34px;font-size:13px}
  table{width:100%;border-collapse:collapse}
  td{padding:9px 4px;border-top:1px solid var(--line);vertical-align:middle}
  .pron{color:var(--muted);font-size:14px;width:26%}.form{font-weight:700;font-size:16px}
  .exs{color:#3a5068;font-size:13px}.es{color:var(--muted);font-size:12px}
  tr.obs td{color:#9aa7b4}tr.obs .form{text-decoration:line-through;text-decoration-color:#c3ccd6}
  .obsflag{display:inline-block;font-size:9.5px;font-weight:800;color:#8a97a6;background:#eef0f3;border-radius:10px;padding:1px 6px;margin-left:6px;letter-spacing:.3px;vertical-align:middle}
  .recog{opacity:.62}
  .notes li{font-size:13.5px;line-height:1.55;margin:0 0 7px;color:#2a3f56}
  .v{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}.v:first-child{border-top:0}
  .vmain{flex:1;min-width:0}.vfr{font-weight:700;font-size:16px}.vfr .g{color:var(--coral);font-size:13px;font-weight:600}
  .ves{color:var(--muted);font-size:12.5px}.vex{color:#3a5068;font-size:12.5px;font-style:italic;margin-top:1px}
  .chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
  .chip.cog{background:#d3f9d8;color:#0b7a54}.chip.non{background:#ffe3e3;color:#c92a2a}.chip.semi{background:#fff3bf;color:#8a6d00}
  .tt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#e7f0fb;color:var(--deep);white-space:nowrap}
  .reg{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;letter-spacing:.2px}
  .reg.parle{background:#d3f9d8;color:#0b7a54}.reg.standard{background:#e7f0fb;color:#3060a0}.reg.ecrit{background:#efe6fb;color:#6a3fb0}.reg.litteraire{background:#f0e3e3;color:#9a5b5b}
  .gpair{display:flex;gap:6px;align-items:center}
  .sent{padding:12px 0;border-top:1px solid var(--line);display:flex;gap:11px;align-items:flex-start}.sent:first-child{border-top:0}
  .sfr{font-weight:600;font-size:15.5px;line-height:1.35}.ses{color:var(--muted);font-size:13px;margin-top:2px}.sen{color:#93a6ba;font-size:12px;font-style:italic;margin-top:1px}
  .tabs{display:flex;gap:6px;margin:0 0 14px;flex-wrap:wrap}
  .tab{flex:1;min-width:66px;text-align:center;padding:9px 4px;border-radius:11px;font-size:12px;font-weight:700;background:#fff;color:var(--muted);border:0;cursor:pointer}
  .tab.on{background:var(--sea);color:#fff}
  /* sounds */
  .snd{border-top:1px solid var(--line);padding:14px 0}.snd:first-child{border-top:0}
  .sndh{display:flex;align-items:center;gap:10px}
  .ipa{font-family:"Times New Roman",serif;font-weight:800;color:#fff;background:linear-gradient(135deg,#6a5cff,#4534d6);
    border-radius:10px;padding:5px 9px;font-size:15px;min-width:40px;text-align:center}
  .sndlab{font-weight:700;font-size:16px;flex:1}.newb{font-size:9.5px;font-weight:800;color:#a1560b;background:#ffe8c2;border-radius:10px;padding:2px 7px}
  .spell{color:var(--muted);font-size:12px}
  .sndnote{font-size:13px;color:#2a3f56;line-height:1.5;margin:8px 0 6px;background:#f6f8fc;border-radius:10px;padding:9px 11px}
  .ex{display:flex;align-items:center;gap:10px;padding:7px 0}
  .exfr{font-weight:700;font-size:15px}.exipa{color:#6a5cff;font-family:"Times New Roman",serif;font-size:12px}.exes{color:var(--muted);font-size:12px}
  .pair{display:flex;gap:8px;margin-top:8px;background:#fff7ec;border-radius:12px;padding:10px}
  .pcol{flex:1;text-align:center}.pcol .w{font-weight:800;font-size:15px}
  .pnote{font-size:12px;color:#8a6d00;margin-top:6px;line-height:1.4}
  /* flash + quiz */
  .stage{background:#fff;border-radius:22px;box-shadow:0 12px 30px rgba(6,42,90,.14);padding:24px 18px;min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .mix{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px}.mix .hard{color:var(--coral)}.mix .cog{color:var(--good)}
  .prompt{font-size:14px;color:var(--muted)}.big2{font-size:30px;font-weight:800;margin:8px 0}
  .rev{font-size:15px;color:var(--muted);min-height:76px;display:flex;flex-direction:column;gap:5px;align-items:center;justify-content:center}
  .rev .fr{font-size:24px;font-weight:800;color:var(--ink)}.rev .ipa2{color:var(--sea);font-family:"Times New Roman",serif}
  .btns{display:flex;gap:10px;margin-top:16px}.btns button{flex:1;border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}
  .reveal{background:var(--sea)}.again{background:#ff8787}.gd{background:var(--good)}
  .prog{height:6px;background:#dbe5f0;border-radius:3px;overflow:hidden;margin:0 0 14px}.prog>i{display:block;height:100%;background:var(--sun);width:0}
  .opt{display:block;width:100%;text-align:left;border:2px solid var(--line);background:#fff;border-radius:13px;padding:14px;margin:8px 0;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer}
  .opt.correct{border-color:var(--good);background:#eafaf3}.opt.wrong{border-color:var(--bad);background:#fdecec}
  .qtype{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.qbig{font-size:22px;font-weight:800;margin:6px 0 4px}.qsub{color:var(--muted);font-size:13px;margin-bottom:6px}
  .hidden{display:none!important}.empty{text-align:center;color:var(--muted);padding:36px 16px}
  .lead{font-size:13px;color:#2a3f56;line-height:1.5;margin:0 0 12px}
</style>
<style>
  /* ---- BIG readability upsize (overrides above) ---- */
  body{font-size:18px}
  .top h1{font-size:20px}
  .card h2{font-size:14px}
  .lnum{font-size:20px}.lcard .t{font-size:21px}.lcard .s{font-size:15px}
  .big{font-size:19px;padding:16px}
  .pron{font-size:16.5px}.form{font-size:20px}.exs{font-size:16px}.es{font-size:14.5px}
  .notes li{font-size:16.5px;line-height:1.6}
  .vfr{font-size:19.5px}.ves{font-size:15px}.vex{font-size:15px}
  .chip{font-size:12px}.tt{font-size:12px}.reg{font-size:11.5px}
  .sfr{font-size:18.5px;line-height:1.4}.ses{font-size:15.5px}.sen{font-size:13.5px}
  .tab{font-size:14.5px;padding:11px 4px}
  .ipa{font-size:18px}.sndlab{font-size:20px}.spell{font-size:14px}.sndnote{font-size:17px;line-height:1.6}
  .newb{font-size:11.5px}.obsflag{font-size:11px}
  .exfr{font-size:18.5px}.exipa{font-size:14px}.exes{font-size:14px}
  .pcol .w{font-size:19px}.pnote{font-size:15px}
  .lead{font-size:17px;line-height:1.6}
  .prompt{font-size:16px}.big2{font-size:36px}.rev{font-size:16.5px}.rev .fr{font-size:30px}
  .btns button{font-size:17px}
  .qtype{font-size:13px}.qbig{font-size:25px}.qsub{font-size:15px}.opt{font-size:19px;padding:15px}
  /* ---- reading material (connective tissue) ---- */
  .reader{font-size:17px;line-height:1.62;color:#26384d}
  .reader h3{font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:16px 0 6px}
  .reader h3:first-child{margin-top:0}
  .reader p{margin:0 0 11px}
  .reader b,.reader .k{color:var(--deep);font-weight:800}
  .reader .fr{font-weight:700;color:#0a3d7a;font-style:normal}
  .reader .lead-in{font-size:18.5px;line-height:1.5;font-weight:600;color:var(--ink)}
  .maps{margin:6px 0 12px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
  .maprow{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--line);font-size:16px}
  .maprow:first-child{border-top:0}
  .maprow .esx{color:var(--muted);flex:1}.maprow .arw{color:var(--coral);font-weight:800}
  .maprow .frx{font-weight:700;color:#0a3d7a;flex:1;text-align:right}
  .callout{background:#fff7ec;border-left:4px solid var(--sun);border-radius:8px;padding:11px 13px;margin:0 0 12px;font-size:16.5px;line-height:1.55}
  .callout b{color:#a1560b}
  .modetog{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap}
  .modetog .mt{flex:1 1 40%;min-width:120px;border:0;border-radius:14px;padding:13px;font-size:15.5px;font-weight:800;cursor:pointer;background:#fff;color:var(--muted);box-shadow:0 6px 16px rgba(6,42,90,.07)}
  .modetog .mt.on{background:linear-gradient(135deg,var(--sea),var(--deep));color:#fff}
  .story{font-size:19px;line-height:1.7;color:#1c2f42;margin:0}
  .langtog{display:flex;justify-content:flex-end;align-items:center;gap:6px;margin:0 0 10px}
  .langb{border:2px solid var(--line);background:#fff;color:var(--muted);border-radius:16px;padding:5px 11px;font-size:12px;font-weight:800;cursor:pointer}
  .langb.on{border-color:var(--sea);background:var(--sea);color:#fff}
  /* orientation box: how the concept is built */
  .orient{background:linear-gradient(180deg,#f2f8ff,#eaf3ff);border:1px solid #cfe2fb}
  .orienthead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:0 0 4px}
  .orienthead .langtog{margin:0}
  .obadge{font-size:11.5px;font-weight:800;letter-spacing:.02em;color:var(--deep);background:#d8e9ff;border-radius:12px;padding:4px 10px;white-space:nowrap}
  .orient h2{margin:6px 0 8px;font-size:19px;color:var(--deep)}
  .obody{font-size:16px;line-height:1.62;color:#1c2f42}
  .obody p{margin:0 0 10px}
  .obody .fx{color:#0a3d7a;font-weight:700;font-style:normal}
  .obody b{color:#083a72}
  .opat{background:#fff;border:1px dashed #9cc3f0;border-radius:10px;padding:10px 12px;margin:11px 0;font-size:15px;font-weight:600;color:#0a3d7a;text-align:center;line-height:1.7}
  .oul{margin:10px 0;padding-left:20px}
  .oul li{margin:0 0 6px;line-height:1.5}
  .oform{width:100%;border-collapse:collapse;margin:10px 0;font-size:14.5px}
  .oform td{border:1px solid #cfe2fb;padding:6px 9px;vertical-align:top}
  .oform td.k{background:#eaf3ff;font-weight:700;color:#0a3d7a;white-space:nowrap;width:1%}
  /* bilingual reader pairs: French over its literal Spanish, visually grouped */
  .reader .pair{margin:0 0 13px;border-left:4px solid var(--sea);border-radius:0 12px 12px 0;overflow:hidden;box-shadow:0 2px 9px rgba(6,42,90,.06)}
  .reader .pair .fr{background:#e8f1fc;color:#0a3d7a;padding:11px 13px;font-size:17.5px;line-height:1.5;font-weight:600}
  .reader .pair .es{background:#fff6e9;color:#7a5a2e;padding:10px 13px 11px;font-size:15.5px;line-height:1.5;font-style:italic}
  .reader .pair .flag{display:block;font-size:10.5px;letter-spacing:.5px;font-weight:800;opacity:.55;font-style:normal;margin-bottom:2px}
  .warn{background:#fff3cd;border:1.5px solid #ffd66b;color:#7a5a00;border-radius:14px;padding:12px 14px;margin:0 0 14px;font-size:14.5px;line-height:1.5;font-weight:600}
</style>
</head>
<body>
<div class="top"><button class="back" id="back">‹</button><h1 id="ttl">Français pour bébas</h1><button class="back" style="display:block;font-size:17px" onclick="location.hash='settings'">⚙️</button></div>
<div id="view" class="wrap"></div>
<script>
const AUDIO={base:"",clips:{},v:1};
let LESSONS=[], GRAMMAR=null, ESS=null, CULTURE=null, STORIES=null, cur=null;
const REGLBL={parle:'🗣️ parlé',standard:'standard',ecrit:'écrit',litteraire:'littéraire'};
const esc=s=>(s||'').replace(/</g,'&lt;');

async function boot(){
  const man=await fetch('data/audio_manifest.json').then(r=>r.json());
  AUDIO.base=man.audio_base;AUDIO.clips=man.clips;AUDIO.v=man.version||1;
  AUDIO.backends=man.backends||{gg:{prefix:'gg',label:'Google'}};
  AUDIO.backend=man.default_backend||Object.keys(AUDIO.backends)[0];  // fixed to Google, not user-selectable
  GRAMMAR=await fetch('data/spoken_grammar.json').then(r=>r.json()).catch(()=>null);
  ESS=await fetch('data/spoken_essentials.json').then(r=>r.json()).catch(()=>null);
  CULTURE=await fetch('data/quiz_culture.json').then(r=>r.json()).catch(()=>null);
  STORIES=await fetch('data/stories.json').then(r=>r.json()).catch(()=>null);
  const files=['data/curriculum/lesson_00_sons.json','data/curriculum/lesson_01_etre.json','data/curriculum/lesson_02_avoir.json',
    'data/curriculum/lesson_03_salut.json','data/curriculum/lesson_04_chiffres.json','data/curriculum/lesson_05_cafe.json',
    'data/curriculum/lesson_06_couleurs.json','data/curriculum/lesson_07_verbes_er.json',
    'data/curriculum/lesson_08_passe_compose.json','data/curriculum/lesson_09_imparfait.json',
    'data/curriculum/lesson_10_metiers.json','data/curriculum/lesson_11_ecole.json',
    'data/curriculum/lesson_12_dehors.json','data/curriculum/lesson_13_survie.json',
    'data/curriculum/lesson_14_small_talk.json','data/curriculum/lesson_15_vulgarite.json',
    'data/curriculum/lesson_16_verbes_ir_oir.json','data/curriculum/lesson_17_histoire.json',
    'data/curriculum/lesson_18_mode.json','data/curriculum/lesson_19_cuisine.json',
    'data/curriculum/lesson_20_mythes_religions.json','data/curriculum/lesson_21_prepositions.json',
    'data/curriculum/lesson_22_temps.json','data/curriculum/lesson_23_famille.json',
    'data/curriculum/lesson_24_meteo.json','data/curriculum/lesson_25_sante.json',
    'data/curriculum/lesson_26_tech.json',
    'data/curriculum/lesson_27_questions.json','data/curriculum/lesson_28_negation.json',
    'data/curriculum/lesson_29_quotidien.json','data/curriculum/lesson_30_pronoms.json',
    'data/curriculum/lesson_31_comparer.json','data/curriculum/lesson_32_possessifs.json',
    'data/curriculum/lesson_33_imperatif.json'];
  LESSONS=await Promise.all(files.map(f=>fetch(f).then(r=>r.json())));
  route();
}
window.addEventListener('hashchange',()=>{route();window.scrollTo(0,0);});
function aurl(id){const p=(AUDIO.backends[AUDIO.backend]||{}).prefix||'el';return AUDIO.base+p+'/'+id+'.mp3?v='+AUDIO.v;}
function play(id,btn){
  if(!id||!AUDIO.clips[id])return;
  if(cur){cur.el.pause();cur.el.currentTime=0;cur.btn&&cur.btn.classList.remove('playing');}
  const el=new Audio(aurl(id));cur={el,btn};if(btn)btn.classList.add('playing');
  el.addEventListener('ended',()=>btn&&btn.classList.remove('playing'));
  el.play().catch(()=>btn&&btn.classList.remove('playing'));
}
document.body.addEventListener('click',e=>{const b=e.target.closest('[data-aud]');if(b)play(b.dataset.aud,b);});
function chip(ct){return ct==='non_cognate'?'<span class="chip non">nuevo ⭐</span>':ct==='semi'?'<span class="chip semi">semi</span>':'<span class="chip cog">cognado</span>';}
function reg(r){return r?`<span class="reg ${r}">${REGLBL[r]||r}</span>`:'';}
function pbtn(id,cls){return id?`<button class="pbtn ${cls||''}" data-aud="${id}">▶︎</button>`:'';}

/* ---------- progress store (localStorage, versioned) ---------- */
const PROG_VER=1, PROG_KEY='fpb_progress';
function loadProgress(){try{const p=JSON.parse(localStorage.getItem(PROG_KEY));if(!p||p.v!==PROG_VER)return{v:PROG_VER,lessons:{},quiz:{},cards:{}};return p;}catch(e){return{v:PROG_VER,lessons:{},quiz:{},cards:{}};}}
function saveProgress(p){try{localStorage.setItem(PROG_KEY,JSON.stringify(p));}catch(e){}}
function clearProgress(){localStorage.removeItem(PROG_KEY);}
function markLessonSeen(id){const p=loadProgress();p.lessons[id]=Date.now();saveProgress(p);}
function recordQuiz(cat,score,total){const p=loadProgress();const q=p.quiz[cat]||{best:0,plays:0};q.plays++;q.best=Math.max(q.best,Math.round(score/total*100));p.quiz[cat]=q;saveProgress(p);}
function recordCard(id,known){const p=loadProgress();const c=p.cards[id]||{box:0,seen:0};c.seen++;c.box=known?Math.min((c.box||0)+1,4):0;c.ts=Date.now();p.cards[id]=c;saveProgress(p);}

function renderSettings(){
  document.getElementById('ttl').textContent='Réglages';
  const p=loadProgress();
  const totalL=LESSONS.length, seenL=Object.keys(p.lessons).length;
  const cards=Object.values(p.cards), known=cards.filter(c=>c.box>=2).length, cseen=cards.length;
  const qrows=Object.entries(p.quiz).map(([k,q])=>`<div class="v"><div class="vmain"><div class="vfr" style="font-size:15px">${k}</div><div class="ves">${q.plays} parties</div></div><div style="font-weight:800;color:var(--good)">${q.best}%</div></div>`).join('')||'<div class="ves">Aucun quiz encore.</div>';
  document.getElementById('view').innerHTML=`
    <div class="card"><h2>Ta progression</h2>
      <div class="v"><div class="vmain"><div class="vfr">Leçons vues</div></div><div style="font-weight:800">${seenL} / ${totalL}</div></div>
      <div class="v"><div class="vmain"><div class="vfr">Cartes sues</div><div class="ves">${cseen} vues</div></div><div style="font-weight:800;color:var(--good)">${known}</div></div>
    </div>
    <div class="card"><h2>Quiz — meilleurs scores</h2>${qrows}</div>
    <div class="card"><h2>Données</h2>
      <div class="ves" style="margin-bottom:10px">La progression est stockée sur ton téléphone (rien en ligne).</div>
      <button class="big" style="background:linear-gradient(135deg,var(--bad),#b02020)" onclick="if(confirm('Effacer TOUTE la progression ?')){clearProgress();renderSettings();}">🗑️ Effacer toute la progression</button>
    </div>`;
}

function route(){

/* ---------- Flashcards ---------- */
const shuffle=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1]);
function buildCardDeck(){
  const all=LESSONS.filter(L=>L.vocab).flatMap(L=>L.vocab);
  const P=loadProgress().cards;
  const box=v=>(P[v.id]&&P[v.id].box)||0, cog=v=>v.cognate_type==='transparent';
  const scored=all.map(v=>({v,b:box(v),c:cog(v),r:Math.random()}));
  scored.sort((a,b)=> a.b-b.b || (a.c-b.c) || a.r-b.r);  // low box first; hard before cognate
  const hard=scored.filter(s=>!s.c).map(s=>s.v), cg=scored.filter(s=>s.c).map(s=>s.v);
  const d=[];let hi=0,ci=0;
  while(d.length<22 && (hi<hard.length||ci<cg.length)){
    for(let k=0;k<3&&hi<hard.length;k++)d.push(hard[hi++]);  // 3 harder words
    if(ci<cg.length)d.push(cg[ci++]);                         // + 1 cognate sprinkle (confidence)
  }
  return d;
}

function itemAV(it){

  return {fr:it.fr, es:it.es, aud:it.audio};

function buildQuiz(cat){
  const items=[...LESSONS.filter(L=>L.vocab).flatMap(L=>L.vocab),
               ...LESSONS.filter(L=>L.sentences).flatMap(L=>L.sentences)]
    .map(itemAV).filter(x=>x.aud&&x.es&&x.fr);
  const allES=[...new Set(items.map(x=>x.es))], allFR=[...new Set(items.map(x=>x.fr))];
  const pick=(arr,not,n)=>shuffle(arr.filter(x=>x!==not)).slice(0,n);
  const Q={ecoute:[],trad:[],gram:[],culture:[],pieges:[]};
  items.forEach(x=>{
    Q.ecoute.push({type:'🎧 Sens',q:'Écoute — quel est le sens ?',aud:x.aud,autoplay:1,ans:x.es,opts:shuffle([x.es,...pick(allES,x.es,3)])});
    Q.ecoute.push({type:'🎧 Transcription',q:'Écoute — quelle phrase ?',aud:x.aud,autoplay:1,ans:x.fr,opts:shuffle([x.fr,...pick(allFR,x.fr,3)])});
    Q.trad.push({type:'🇪🇸 → 🇫🇷',q:x.es,ans:x.fr,opts:shuffle([x.fr,...pick(allFR,x.fr,3)]),aud:x.aud});
    Q.trad.push({type:'🇫🇷 → 🇪🇸',q:x.fr,aud:x.aud,ans:x.es,opts:shuffle([x.es,...pick(allES,x.es,3)])});
  });
  const verbL=LESSONS.filter(L=>L.grammar);
  const forms=[...new Set(verbL.flatMap(L=>L.grammar.conjugation.present.map(r=>r.form)))];
  verbL.forEach(L=>{const c=L.grammar.conjugation;c.present.forEach(r=>{if(/^nous/.test(r.pron.trim()))return;
    Q.gram.push({type:'Conjugaison',q:`${c.verb} — ${r.pron.split('/')[0].trim()}`,ans:r.form,opts:shuffle([r.form,...pick(forms,r.form,3)]),aud:r.audio});});});
  LESSONS.filter(L=>L.vocab).flatMap(L=>L.vocab).filter(v=>v.gender&&/^(le |la )/.test(v.fr||'')).forEach(v=>{
    const bare=v.fr.replace(/^(le|la) /,'');
    Q.gram.push({type:'Genre',q:`___ ${bare}`,sub:'le / la ?',ans:v.fr.startsWith('la')?'la':'le',opts:['le','la'],aud:v.audio});});
  LESSONS.filter(L=>L.drills).flatMap(L=>L.drills).forEach(d=>Q.gram.push({type:d.type||'✍️ Grammaire',q:d.q,sub:d.sub,ans:d.ans,opts:shuffle((d.opts||[]).slice()),aud:d.aud}));
  ((CULTURE&&CULTURE.questions)||[]).forEach(c=>Q.culture.push({type:'🧠 Culture',q:c.q,ans:c.answer,opts:shuffle(c.options.slice())}));
  ((GRAMMAR&&GRAMMAR.spanish_traps)||[]).filter(t=>t.right&&t.wrong&&/[a-zà-ÿ]/i.test(t.wrong)).forEach(t=>Q.pieges.push({type:'⚖️ Piège',q:t.right.es,sub:'français correct :',ans:t.right.fr,opts:shuffle([t.right.fr,t.wrong])}));
  let pool;
  if(cat==='mix') pool=[].concat(...Object.values(Q).map(a=>shuffle(a.slice()).slice(0,6)));
  else pool=(Q[cat]||[]).slice();
  return shuffle(pool).slice(0,16);
}
let quiz=[],qi=0,qs=0,quizCat='mix';
function renderQuiz(cat){quizCat=cat||'mix';document.getElementById('ttl').textContent='Quiz';quiz=buildQuiz(quizCat);qi=0;qs=0;drawQ();}
function drawQ(){
  const host=document.getElementById('view');
  if(!quiz.length){host.innerHTML=`<div class="stage"><div class="empty">Rien ici pour l'instant.<br><br><button class="big coral" style="max-width:240px" onclick="location.hash=''">Retour</button></div></div>`;return;}
  if(qi>=quiz.length){const p=Math.round(qs/quiz.length*100);recordQuiz(quizCat,qs,quiz.length);
    host.innerHTML=`<div class="stage"><div class="empty"><div style="font-size:40px">${p>=80?'🎉':p>=50?'👍':'💪'}</div><div style="font-size:22px;font-weight:800;margin:8px 0">${qs}/${quiz.length}</div><button class="big coral" style="max-width:240px" onclick="renderQuiz(quizCat)">Encore</button></div></div>`;return;}
  const q=quiz[qi];host.dataset.done='';
  const audBtn=q.aud?`<div style="text-align:center;margin:4px 0 10px"><button class="pbtn" data-aud="${q.aud}" style="width:58px;height:58px;font-size:23px">🔊</button></div>`:'';
  host.innerHTML=`<div class="prog"><i style="width:${qi/quiz.length*100}%"></i></div>
    <div class="card"><div class="qtype">${q.type} · ${qi+1}/${quiz.length}</div><div class="qbig">${esc(q.q)}</div>${q.sub?`<div class="qsub">${q.sub}</div>`:''}
      ${audBtn}<div>${q.opts.map(o=>`<button class="opt" data-o="${esc(o)}">${esc(o)}</button>`).join('')}</div></div>`;
  if(q.autoplay&&q.aud)play(q.aud);
  host.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{if(host.dataset.done)return;host.dataset.done='1';
    const ok=b.dataset.o===q.ans;if(ok){b.classList.add('correct');qs++;}else{b.classList.add('wrong');host.querySelectorAll('.opt').forEach(x=>{if(x.dataset.o===q.ans)x.classList.add('correct');});}
    if(q.aud&&!q.autoplay)play(q.aud);setTimeout(()=>{qi++;drawQ();},ok?800:1700);});
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
boot();
</script>
